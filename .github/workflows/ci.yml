name: CI

on:
  push:
  pull_request:

jobs:
  required:
    name: required gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Active import guard
        run: npm run guard:active-imports

      - name: Fast unit suite
        # F6: run the complete fast Vitest suite, not a regex subset. The slow
        # stochastic suites (calibration, K15 reproduction, LOO, R-hat) are
        # relegated to the nightly workflow.
        run: npm run test:fast

      - name: Evidence-status freshness
        # F6: fail if the committed evidence-status JSON has drifted from the
        # ledger + priors. Regenerates in memory (ignoring generatedAt) and
        # compares to the committed files.
        run: npm run evidence:check

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Focused browser smoke
        run: >
          npx playwright test
          tests/e2e/calibration.smoke.spec.ts
          tests/e2e/crew_composition.smoke.spec.ts
          --grep "Batch Fit tab renders config form|V&V tab shows reference-model regression and sensitivity panels|scenario trait coupling exposes beta scale control"

  python-fast:
    name: python fast tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        working-directory: python
        run: python -m pip install -e ".[dev]"

      - name: Python tests
        working-directory: python
        run: python -m pytest -m "not slow"
