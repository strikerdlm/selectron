name: Nightly Validation

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

jobs:
  slow-validation:
    name: slow validation lanes
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Analog IMM validation
        run: npm run validate:imm:analog

      - name: K15 IMM benchmark
        run: npm run validate:imm

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Full browser suite
        run: npm run verify:e2e

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python package
        working-directory: python
        run: python -m pip install -e ".[dev]"

      - name: Full Python suite
        working-directory: python
        run: python -m pytest
