# Sync application code to the public selectron repo when private master moves
# or a release tag is pushed. Manuscript / submission assets stay private only.
#
# Auth: deploy key SELECTRON_PUBLIC_DEPLOY_KEY (write access on strikerdlm/selectron).
# Bootstrapped automatically; no PAT required from the maintainer.

name: Sync public selectron

on:
  push:
    branches:
      - master
    tags:
      - "v*"
      - "0.*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_label:
        description: "Label for the commit message (defaults to short SHA)"
        required: false
        type: string

env:
  PUBLIC_REPO: strikerdlm/selectron
  PUBLIC_DIR: selectron-public

jobs:
  sync-and-push:
    name: sync to public master
    runs-on: ubuntu-latest
    steps:
      - name: Resolve sync label
        id: meta
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            label="${{ github.event.release.tag_name }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            label="${{ github.ref_name }}"
          elif [ -n "${{ inputs.tag_label }}" ]; then
            label="${{ inputs.tag_label }}"
          else
            label="manual-${GITHUB_SHA:0:7}"
          fi
          echo "label=$label" >> "$GITHUB_OUTPUT"

      - name: Require deploy key secret
        env:
          SELECTRON_PUBLIC_DEPLOY_KEY: ${{ secrets.SELECTRON_PUBLIC_DEPLOY_KEY }}
        run: |
          if [ -z "${SELECTRON_PUBLIC_DEPLOY_KEY}" ]; then
            echo "::error::Missing SELECTRON_PUBLIC_DEPLOY_KEY on selectron_private."
            echo "Run: node scripts/bootstrap-public-sync-auth.mjs (once) from a machine with gh admin access."
            exit 1
          fi

      - name: Checkout selectron_private
        uses: actions/checkout@v4
        with:
          path: private
          fetch-depth: 0

      - name: Load SSH deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SELECTRON_PUBLIC_DEPLOY_KEY }}

      - name: Verify deploy key can reach public repo
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts
          if ! git ls-remote "git@github.com:${PUBLIC_REPO}.git" HEAD >/dev/null 2>&1; then
            echo "::error::SELECTRON_PUBLIC_DEPLOY_KEY cannot authenticate to ${PUBLIC_REPO}."
            echo "The private-repo secret and public-repo deploy key are out of sync."
            echo "Fix once from an admin machine: node scripts/bootstrap-public-sync-auth.mjs"
            exit 1
          fi
          echo "Deploy key verified for ${PUBLIC_REPO}."

      - name: Checkout public selectron
        run: |
          set -euo pipefail
          git clone --branch master --single-branch "git@github.com:${PUBLIC_REPO}.git" "${PUBLIC_DIR}"

      - name: Sync application tree (exclude manuscripts)
        run: node scripts/sync-to-public.mjs "${{ github.workspace }}/${{ env.PUBLIC_DIR }}"
        working-directory: private

      - name: Push to public master
        env:
          LABEL: ${{ steps.meta.outputs.label }}
        working-directory: ${{ env.PUBLIC_DIR }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --staged --quiet; then
            echo "Public repo already matches selectron_private at ${LABEL}; nothing to push."
            exit 0
          fi

          git commit -m "sync: align with selectron_private ${LABEL}" \
            -m "Automated one-way sync from selectron_private (${GITHUB_SHA})." \
            -m "Manuscript and journal-submission assets are excluded by design."

          git push origin master
          echo "Pushed sync for ${LABEL} to ${PUBLIC_REPO} master."
